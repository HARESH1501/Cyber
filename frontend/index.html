<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberbullying Detection - AI Powered</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon">🛡️</div>
                <h1 class="title">Cyberbullying Detection</h1>
            </div>
            <p class="subtitle">AI-Powered Text Analysis for Online Safety</p>
        </header>

        <div class="main-card">
            <div class="input-section">
                <label for="textInput" class="input-label">Enter text to analyze</label>
                <textarea 
                    id="textInput" 
                    class="text-input" 
                    placeholder="Type or paste text here to check for cyberbullying, hate speech, or threats..."
                    rows="6"
                ></textarea>
                <div class="char-count">
                    <span id="charCount">0</span> / 500 characters
                </div>
            </div>

            <button id="analyzeBtn" class="analyze-btn">
                <span class="btn-text">Analyze Text</span>
                <span class="btn-icon">→</span>
            </button>

            <div id="loadingContainer" class="loading-container hidden">
                <div class="loading-spinner"></div>
                <p class="loading-text">Analyzing text...</p>
            </div>

            <div id="resultContainer" class="result-container hidden">
                <div class="result-card">
                    <div class="result-header">
                        <h3>Analysis Result</h3>
                        <div id="statusBadge" class="status-badge"></div>
                    </div>
                    
                    <div class="result-content">
                        <div class="prediction-box">
                            <div class="prediction-label">Classification</div>
                            <div id="predictionText" class="prediction-text"></div>
                        </div>
                        
                        <div class="confidence-box-simple">
                            <div class="confidence-label-simple">Confidence Level</div>
                            <div class="confidence-percentage-display">
                                <span id="confidencePercentage" class="confidence-number">0</span>%
                            </div>
                        </div>

                        <div class="details-box">
                            <div class="details-label">Detailed Category</div>
                            <div id="detailedPrediction" class="details-text"></div>
                        </div>
                    </div>

                    <button id="analyzeAgainBtn" class="analyze-again-btn">
                        Analyze Another Text
                    </button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Powered by DistilBERT AI Model | Built with FastAPI & Modern Web Technologies</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
